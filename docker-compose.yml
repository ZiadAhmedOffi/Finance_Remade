services:
  db:
    image: postgres:15
    container_name: investment_db
    restart: always
    environment:
      POSTGRES_DB: investment_db
      POSTGRES_USER: investment_user
      POSTGRES_PASSWORD: investment_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: investment_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
